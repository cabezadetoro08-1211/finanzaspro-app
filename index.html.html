<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanzasPro AI - Simulador</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar for seamless mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .tab-content {
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Custom color input styling */
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 9999px;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-0 sm:p-4">

    <!-- Shell/Container matching smartphone dimensions but responsive -->
    <div class="w-full max-w-md bg-slate-900 text-slate-100 min-h-screen sm:min-h-[844px] sm:max-h-[844px] sm:rounded-[3rem] sm:shadow-[0_25px_50px_-12px_rgba(0,0,0,0.8)] relative flex flex-col overflow-hidden border border-slate-800">
        
        <!-- Smartphone Notch/Speaker bar on desktop -->
        <div class="hidden sm:flex justify-center w-full absolute top-2 left-0 z-50">
            <div class="w-32 h-6 bg-black rounded-full flex items-center justify-center">
                <div class="w-12 h-1 bg-neutral-800 rounded-full"></div>
            </div>
        </div>

        <!-- Top Status Bar -->
        <header class="flex justify-between items-center px-6 pt-6 pb-2 text-xs font-semibold text-slate-400 z-10 select-none">
            <span id="live-clock">12:00</span>
            <div class="flex items-center gap-1.5">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-three-quarters"></i>
            </div>
        </header>

        <!-- Dynamic Page Header -->
        <div class="px-6 py-2 flex justify-between items-center border-b border-slate-800/60 select-none">
            <div class="flex items-center gap-2">
                <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></div>
                <h1 id="app-title" class="text-xl font-black tracking-tight text-white">Cartera</h1>
            </div>
            <button onclick="window.showAIQuestion()" class="w-8 h-8 rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center text-indigo-400 hover:bg-slate-700 transition-colors">
                <i class="fa-solid fa-wand-magic-sparkles text-sm"></i>
            </button>
        </div>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto px-5 py-4 pb-28 no-scrollbar relative">

            <!-- TAB 1: WALLET (DASHBOARD) -->
            <section id="view-dashboard" class="tab-content space-y-6">
                <!-- Main Balance Sheet -->
                <div class="bg-gradient-to-br from-indigo-950 via-slate-900 to-slate-900 border border-indigo-500/20 rounded-3xl p-6 relative overflow-hidden shadow-xl shadow-indigo-950/20">
                    <div class="absolute -right-12 -top-12 w-40 h-40 bg-indigo-500/10 rounded-full blur-2xl"></div>
                    <span class="text-[10px] font-bold text-indigo-300 uppercase tracking-widest block mb-1">Deuda en Tarjetas</span>
                    <h2 id="total-debt" class="text-4xl font-black text-rose-400 tracking-tight">$0.00</h2>
                    
                    <div class="mt-4 flex flex-wrap gap-2">
                        <button onclick="window.runAIPrediction()" class="px-3 py-1.5 bg-indigo-600/20 hover:bg-indigo-600/30 border border-indigo-500/30 rounded-xl text-[10px] font-black uppercase text-indigo-300 tracking-wider flex items-center gap-1 transition-all">
                            <i class="fa-solid fa-chart-line"></i> Predecir Fin de Mes ✨
                        </button>
                        <button onclick="window.runAISimulation()" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl text-[10px] font-black uppercase text-slate-300 tracking-wider flex items-center gap-1 transition-all">
                            <i class="fa-solid fa-shuffle"></i> Simular Escenario ✨
                        </button>
                    </div>
                </div>

                <!-- Reminders section -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center px-1">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Próximos Recordatorios</h3>
                        <button onclick="window.switchTab('view-settings')" class="text-xs font-bold text-indigo-400 hover:underline">Ver todos</button>
                    </div>
                    <div id="reminders-preview" class="space-y-2.5"></div>
                </div>

                <!-- Savings Goals section -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center px-1">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Metas de Ahorro</h3>
                        <button onclick="window.openGoalPlanner()" class="text-xs font-bold text-indigo-400 hover:underline">+ Planificar Meta</button>
                    </div>
                    <div id="goals-list" class="space-y-2.5">
                        <!-- Dynamic list generated in JS -->
                    </div>
                </div>

                <!-- Active Cards section -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center px-1">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Mis Tarjetas</h3>
                        <span class="text-[10px] text-slate-500">Saldo/Límite</span>
                    </div>
                    <div id="cards-list" class="space-y-2.5">
                        <!-- Dynamic list generated in JS -->
                    </div>
                </div>
            </section>

            <!-- TAB 2: INCOME (INGRESOS) -->
            <section id="view-finances" class="tab-content hidden space-y-6">
                <div class="bg-emerald-950/20 border border-emerald-500/20 rounded-3xl p-5 flex justify-between items-center">
                    <div>
                        <span class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-1">Ingreso Mensual Consolidado</span>
                        <h3 id="total-income-display" class="text-3xl font-black text-emerald-400 tracking-tight">$0.00</h3>
                    </div>
                    <button onclick="window.openAddIncomeModal()" class="w-10 h-10 rounded-2xl bg-emerald-500 text-slate-900 font-bold flex items-center justify-center hover:bg-emerald-400 shadow-lg shadow-emerald-500/20 transition-all">
                        <i class="fa-solid fa-plus text-lg"></i>
                    </button>
                </div>

                <div class="space-y-3">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-wider px-1">Fuentes Activas</h4>
                    <div id="ingresos-list" class="space-y-2.5">
                        <!-- Dynamic list of incomes -->
                    </div>
                </div>
            </section>

            <!-- TAB 3: REGISTER MOVEMENT (REGISTRO) -->
            <section id="view-add" class="tab-content hidden space-y-5">
                <div class="bg-slate-800/40 border border-slate-800 p-6 rounded-3xl space-y-5">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Tipo de Movimiento</label>
                        <select id="type" class="w-full p-4 bg-slate-950 border border-slate-800 rounded-2xl font-bold text-slate-200 outline-none focus:border-indigo-500 transition-colors">
                            <option value="gasto">💸 Registrar un Gasto</option>
                            <option value="pago">🏦 Abonar a Tarjeta</option>
                        </select>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Categoría</label>
                        <select id="concept-select" class="w-full p-4 bg-slate-950 border border-slate-800 rounded-2xl font-bold text-slate-200 outline-none focus:border-indigo-500 transition-colors">
                            <!-- Populated with categories -->
                        </select>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Monto exacto ($)</label>
                        <input type="number" id="amount" placeholder="0.00" class="w-full p-4 bg-slate-950 border border-slate-800 rounded-2xl font-black text-2xl text-indigo-400 outline-none focus:border-indigo-500 transition-colors">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Vincular a Tarjeta</label>
                        <select id="target-card" class="w-full p-4 bg-slate-950 border border-slate-800 rounded-2xl font-bold text-slate-200 outline-none focus:border-indigo-500 transition-colors">
                            <!-- Populated with credit cards -->
                        </select>
                    </div>

                    <button onclick="window.processAction()" class="w-full py-4.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg shadow-indigo-600/20 active:scale-95 transition-all">
                        Guardar Movimiento
                    </button>
                </div>
            </section>

            <!-- TAB 4: EXPENSES DETAILED (GASTOS) -->
            <section id="view-list" class="tab-content hidden space-y-6">
                <div class="flex justify-between items-center px-1">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Topes de Categorías</h3>
                    <button onclick="window.runAIPrediction()" class="text-xs font-bold text-indigo-400 hover:underline flex items-center gap-1">
                        <i class="fa-solid fa-robot"></i> Consejos IA
                    </button>
                </div>

                <div id="expenses-detail" class="grid grid-cols-1 gap-3">
                    <!-- Dynamic categories lists -->
                </div>

                <div class="pt-2 space-y-3">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-wider px-1">Historial de Transacciones</h4>
                    <div id="movimientos-list" class="space-y-2">
                        <!-- Recent historical items -->
                    </div>
                </div>
            </section>

            <!-- TAB 5: SETTINGS (CONFIGURACIÓN) -->
            <section id="view-settings" class="tab-content hidden space-y-6">
                <!-- Reminders Section -->
                <div class="space-y-4">
                    <div class="flex justify-between items-center px-1">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Recordatorios</h3>
                        <button onclick="window.promptAddReminder()" class="text-xs font-bold text-indigo-400 hover:underline">+ Nuevo Recordatorio</button>
                    </div>
                    <div id="settings-reminders" class="space-y-2.5">
                        <!-- Interactive list for editing reminders -->
                    </div>
                </div>

                <!-- Cards Editing Section -->
                <div class="space-y-4">
                    <div class="flex justify-between items-center px-1">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Editar Tarjetas</h3>
                        <button onclick="window.promptAddCard()" class="text-xs font-bold text-indigo-400 hover:underline">+ Nueva Tarjeta</button>
                    </div>
                    <div id="settings-cards" class="space-y-2.5">
                        <!-- Interactive list for editing banks -->
                    </div>
                </div>

                <!-- Categories Editing Section -->
                <div class="space-y-4">
                    <div class="flex justify-between items-center px-1">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Editar Categorías</h3>
                        <button onclick="window.promptAddCategory()" class="text-xs font-bold text-indigo-400 hover:underline">+ Nueva Categoría</button>
                    </div>
                    <div id="settings-categories" class="space-y-2.5">
                        <!-- Interactive list for editing items -->
                    </div>
                </div>
            </section>

        </main>

        <!-- Custom Internal Popups & Modals instead of Browser Alerts -->
        <div id="custom-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] hidden items-center justify-center p-6">
            <div class="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-[2rem] p-6 shadow-2xl relative">
                <button onclick="window.closeModal()" class="absolute right-4 top-4 text-slate-400 hover:text-slate-100 text-lg">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <div class="flex flex-col items-center text-center space-y-4">
                    <div id="modal-icon-container" class="w-12 h-12 rounded-2xl bg-indigo-500/10 text-indigo-400 flex items-center justify-center text-2xl">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <h3 id="modal-title" class="text-lg font-black text-white tracking-tight">Título del Modal</h3>
                    <p id="modal-body" class="text-sm text-slate-400 leading-relaxed max-h-60 overflow-y-auto w-full no-scrollbar whitespace-pre-line"></p>
                    <button onclick="window.closeModal()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-sm transition-all">
                        Entendido
                    </button>
                </div>
            </div>
        </div>

        <!-- Custom Prompt/Input Dialog for Dynamic Entries -->
        <div id="prompt-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] hidden items-center justify-center p-6">
            <div class="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-[2rem] p-6 shadow-2xl space-y-4">
                <h3 id="prompt-title" class="text-md font-black text-white tracking-tight">Título del Prompt</h3>
                <div id="prompt-fields" class="space-y-3">
                    <!-- Dynamic fields added dynamically -->
                </div>
                <div class="flex gap-3">
                    <button onclick="window.closePrompt()" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-bold text-sm transition-all">
                        Cancelar
                    </button>
                    <button id="prompt-confirm-btn" class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-sm transition-all">
                        Aceptar
                    </button>
                </div>
            </div>
        </div>

        <!-- Floating Action Button for Register view -->
        <button onclick="window.switchTab('view-add')" class="absolute bottom-20 right-6 w-14 h-14 bg-indigo-600 hover:bg-indigo-500 text-white rounded-full flex items-center justify-center text-xl shadow-lg shadow-indigo-600/30 z-30 transition-transform hover:scale-105 active:scale-95">
            <i class="fa-solid fa-plus"></i>
        </button>

        <!-- Main Navigation Bar -->
        <nav class="absolute bottom-0 left-0 right-0 h-20 bg-slate-900/90 backdrop-blur-md border-t border-slate-800/60 flex justify-around items-center px-4 z-40">
            <button onclick="window.switchTab('view-dashboard')" data-tab="view-dashboard" class="nav-item flex flex-col items-center gap-1 text-indigo-500 transition-all">
                <i class="fa-solid fa-wallet text-xl"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Cartera</span>
            </button>
            <button onclick="window.switchTab('view-finances')" data-tab="view-finances" class="nav-item flex flex-col items-center gap-1 text-slate-500 hover:text-slate-200 transition-all">
                <i class="fa-solid fa-chart-simple text-xl"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Ingresos</span>
            </button>
            <!-- Blank center spacer for floating button -->
            <div class="w-12"></div>
            <button onclick="window.switchTab('view-list')" data-tab="view-list" class="nav-item flex flex-col items-center gap-1 text-slate-500 hover:text-slate-200 transition-all">
                <i class="fa-solid fa-tags text-xl"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Gastos</span>
            </button>
            <button onclick="window.switchTab('view-settings')" data-tab="view-settings" class="nav-item flex flex-col items-center gap-1 text-slate-500 hover:text-slate-200 transition-all relative">
                <i class="fa-solid fa-sliders text-xl"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Ajustes</span>
                <span id="reminder-badge" class="hidden absolute -top-1 right-2 w-2 h-2 bg-rose-500 rounded-full"></span>
            </button>
        </nav>
    </div>

    <script type="module">
        // Global App State
        let state = {
            fuentesIngreso: [
                { id: 1, nombre: "Sueldo Principal", monto: 25000 },
                { id: 2, nombre: "Proyecto Freelance", monto: 5000 }
            ],
            tarjetas: [
                { id: 1, nombre: "Visa Principal", limite: 20000, gastado: 8500 },
                { id: 2, nombre: "American Express", limite: 45000, gastado: 12400 }
            ],
            gastosFijos: [
                { id: '1', nombre: "Comida", tope: 5000, gastado: 3200, emoji: "🌮", color: "#f59e0b" },
                { id: '2', nombre: "Servicios", tope: 3000, gastado: 1800, emoji: "⚡", color: "#3b82f6" },
                { id: '3', nombre: "Entretenimiento", tope: 2500, gastado: 2450, emoji: "🍿", color: "#ec4899" },
                { id: '4', nombre: "Transporte", tope: 1500, gastado: 800, emoji: "🚗", color: "#10b981" }
            ],
            movimientos: [
                { id: 1, concept: "Cena familiar", amount: 1200, type: "gasto", date: new Date().toISOString(), card: "Visa Principal", emoji: "🌮" },
                { id: 2, concept: "Suscripción streaming", amount: 250, type: "gasto", date: new Date().toISOString(), card: "American Express", emoji: "🍿" },
                { id: 3, concept: "Abono mensual", amount: 3000, type: "pago", date: new Date().toISOString(), card: "Visa Principal", emoji: "🏦" }
            ],
            metas: [
                { id: 1, nombre: "Fondo de Emergencias", total: 15000, actual: 4500, cuota: 1500 },
                { id: 2, nombre: "Viaje a la Playa", total: 8000, actual: 3200, cuota: 800 }
            ],
            recordatorios: [
                { id: 1, tipo: 'corte', nombre: 'Visa Principal', dia: 25, monto: null, tarjetaId: 1 },
                { id: 2, tipo: 'pago', nombre: 'Visa Principal', dia: 5, monto: 3000, tarjetaId: 1 },
                { id: 3, tipo: 'servicio', nombre: 'Internet Claro', dia: 10, monto: 1800, tarjetaId: null }
            ]
        };

        // UI Live Clock Simulator
        function updateClock() {
            const now = new Date();
            const hrs = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('live-clock').innerText = `${hrs}:${mins}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Custom alert/confirm replacement modals
        window.showAlert = (title, message, iconClass = "fa-solid fa-circle-info") => {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = message;
            document.getElementById('modal-icon-container').innerHTML = `<i class="${iconClass}"></i>`;
            document.getElementById('custom-modal').classList.remove('hidden');
            document.getElementById('custom-modal').classList.add('flex');
        };

        window.closeModal = () => {
            document.getElementById('custom-modal').classList.add('hidden');
            document.getElementById('custom-modal').classList.remove('flex');
        };

        // Custom Prompt Manager
        let currentPromptCallback = null;
        window.openPrompt = (title, fields, callback) => {
            document.getElementById('prompt-title').innerText = title;
            const container = document.getElementById('prompt-fields');
            container.innerHTML = '';
            
            fields.forEach(f => {
                const grp = document.createElement('div');
                grp.className = "space-y-1";
                if (f.type === 'select') {
                    grp.innerHTML = `
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">${f.label}</label>
                        <select id="prompt-input-${f.id}" class="w-full p-3 bg-slate-950 border border-slate-800 rounded-xl font-bold text-slate-200 outline-none focus:border-indigo-500 transition-colors">
                            ${f.options.map(o => `<option value="${o.value}" ${o.value == f.value ? 'selected' : ''}>${o.label}</option>`).join('')}
                        </select>
                    `;
                } else {
                    grp.innerHTML = `
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">${f.label}</label>
                        <input type="${f.type}" id="prompt-input-${f.id}" value="${f.value || ''}" placeholder="${f.placeholder || ''}" class="w-full p-3 bg-slate-950 border border-slate-800 rounded-xl font-bold text-slate-200 outline-none focus:border-indigo-500 transition-colors">
                    `;
                }
                container.appendChild(grp);
            });

            document.getElementById('prompt-modal').classList.remove('hidden');
            document.getElementById('prompt-modal').classList.add('flex');
            
            currentPromptCallback = callback;
        };

        window.closePrompt = () => {
            document.getElementById('prompt-modal').classList.add('hidden');
            document.getElementById('prompt-modal').classList.remove('flex');
            currentPromptCallback = null;
        };

        document.getElementById('prompt-confirm-btn').onclick = () => {
            if (currentPromptCallback) {
                const inputs = {};
                const inputElements = document.querySelectorAll('[id^="prompt-input-"]');
                inputElements.forEach(el => {
                    const id = el.id.replace('prompt-input-', '');
                    inputs[id] = el.value;
                });
                currentPromptCallback(inputs);
            }
            window.closePrompt();
        };

        // Navigation Manager
        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            
            // Adjust title styling
            const titleMap = {
                'view-dashboard': 'Cartera',
                'view-finances': 'Ingresos',
                'view-add': 'Nuevo Registro',
                'view-list': 'Gastos',
                'view-settings': 'Ajustes'
            };
            document.getElementById('app-title').innerText = titleMap[id] || 'Cartera';

            // Active Tab UI
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('text-indigo-500');
                btn.classList.add('text-slate-500');
                if (btn.getAttribute('data-tab') === id) {
                    btn.classList.add('text-indigo-500');
                    btn.classList.remove('text-slate-500');
                }
            });
        };

        // --- STREAMING_CHUNK: Defining action handlers... ---
        // AI: simulated prediction model
        window.runAIPrediction = () => {
            const totalSpent = state.gastosFijos.reduce((s, g) => s + g.gastado, 0);
            const totalIncome = state.fuentesIngreso.reduce((s, i) => s + i.monto, 0);
            const projection = Math.round(totalSpent * 1.35);
            const isExceeded = projection > totalIncome;
            
            const message = `✨ Predicción basada en tu consumo actual:\n\n` +
                            `Se estima que tu gasto para fin de mes rondará los $${projection.toLocaleString()}.\n` +
                            `${isExceeded ? '⚠️ Estás en riesgo de exceder tus ingresos mensuales. Te sugerimos recortar tus gastos de Entretenimiento de inmediato.' : '✅ Vas por excelente camino. Se proyecta un balance libre restante de $' + (totalIncome - projection).toLocaleString() + ' para ahorrar.'}`;
            
            window.showAlert("Planificador IA ✨", message, "fa-solid fa-robot text-emerald-400");
        };

        // AI: Ask Financial Question
        window.showAIQuestion = () => {
            window.openPrompt("Pregúntale a tu Asistente ✨", [
                { id: 'question', label: 'Escribe tu consulta', type: 'text', placeholder: '¿Me alcanza para comprar un café de $350?' }
            ], (inputs) => {
                const question = inputs.question;
                if (!question || question.trim() === '') return;

                candidate = new Date(now.getFullYear(), now.getMonth() + 1, dia);
            }
            return candidate;
        }
        function daysUntil(dia) {
            const now = new Date(); now.setHours(0,0,0,0);
            const target = nextOccurrence(dia);
            return Math.round((target - now) / 86400000);

            const start = nextOccurrence(r.dia);
            const y = start.getFullYear();
            const m = String(start.getMonth() + 1).padStart(2, '0');
            const d = String(start.getDate()).padStart(2, '0');
            const dt = `${y}${m}${d}`;
            const title = `${tipoLabel(r.tipo)}: ${r.nombre}${r.monto ? ' ($' + r.monto.toLocaleString() + ')' : ''}`;
            const ics = [
                'BEGIN:VCALENDAR',
                'VERSION:2.0',
                'PRODID:-//FinanzasPro AI//ES',
                'BEGIN:VEVENT',
                `UID:${r.id}@finanzaspro`,
                `DTSTART;VALUE=DATE:${dt}`,
                `DTEND;VALUE=DATE:${dt}`,
                'RRULE:FREQ=MONTHLY',
                `SUMMARY:${title}`,
                'BEGIN:VALARM',
                'ACTION:DISPLAY',
                'DESCRIPTION:Recordatorio financiero',
                'TRIGGER:-P1D',
                'END:VALARM',
                'END:VEVENT',
                'END:VCALENDAR'
            ].join('\r\n');
            const blob = new Blob([ics], { type: 'text/calendar' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;

            // Settings views - category editing lists
            document.getElementById('settings-categories').innerHTML = state.gastosFijos.map(c => `
                <div class="p-4 bg-slate-800/40 border border-slate-800 rounded-2xl space-y-3">
                    <div class="flex justify-between items-center">
                        <div class="flex gap-2 items-center">
                            <input type="text" onchange="window.updateSetting('gastosFijos', '${c.id}', 'emoji', this.value)" value="${c.emoji}" class="w-10 p-1.5 bg-slate-950 border border-slate-800 rounded text-center text-sm font-bold text-white outline-none">
                            <input type="text" onchange="window.updateSetting('gastosFijos', '${c.id}', 'nombre', this.value)" value="${c.nombre}" class="bg-transparent font-bold text-sm text-slate-200 outline-none w-32">
                        </div>
                        <button onclick="window.deleteItem('gastosFijos', '${c.id}')" class="text-slate-500 hover:text-rose-500 p-2 transition-colors">
                            <i class="fa-solid fa-trash text-xs"></i>
                        </button>
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-1">
                        <div class="space-y-1">
                            <span class="text-[9px] text-slate-500 font-black uppercase tracking-wider block">Presupuesto Límite</span>
                            <input type="number" onchange="window.updateSetting('gastosFijos', '${c.id}', 'tope', this.value)" value="${c.tope}" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-xs text-indigo-400 font-black outline-none">
                        </div>
                        <div class="space-y-1">
                            <span class="text-[9px] text-slate-500 font-black uppercase tracking-wider block">Color Visual</span>
                            <input type="color" onchange="window.updateSetting('gastosFijos', '${c.id}', 'color', this.value)" value="${c.color || '#6366f1'}" class="w-full h-9 bg-slate-950 border border-slate-800 rounded-xl cursor-pointer">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Initialize view states
        updateUI();
    </script>
</body>
</html>
